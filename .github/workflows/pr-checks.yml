name: ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'charts/**'
      - 'scripts/**'
      - '.github/workflows/pr-checks.yml'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
      - name: helm lint
        run: ./scripts/ci/lint.sh

  check:
    runs-on: ubuntu-latest
    env:
      KUBECONFORM_VERSION: v0.7.0
      KUBECONFORM_SHA256: c31518ddd122663b3f3aa874cfe8178cb0988de944f29c74a0b9260920d115d3
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check if version tag exists
        run: |  
          TAG=$(cat charts/ragnerock/Chart.yaml | grep "version:" | awk '{print($2)}')
          git show-ref --tags | grep "ragnerock-${TAG}$"
          exit_code=$?
          echo ${exit_code}
          if [[ $exit_code -eq 0 ]]; then
            echo "Tag ${TAG} already exists"
            exit 1
          else
            echo "Tag ${TAG} does not exist"
          fi
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Install kubeconform
        run: |
          set -euo pipefail
          tarball="kubeconform-linux-amd64.tar.gz"
          url="https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/${tarball}"
          curl -fsSL "$url" -o "$tarball"
          echo "${KUBECONFORM_SHA256}  ${tarball}" | sha256sum -c -
          tar xzf "$tarball" kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform
          rm -f "$tarball" kubeconform
          kubeconform -v

      - name: helm template + kubeconform + configmap refs
        run: ./scripts/ci/check.sh
