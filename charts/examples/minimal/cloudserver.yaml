---
apiVersion: v1
kind: Secret
metadata:
  name: cloudserver
type: Opaque
stringData:
  SCALITY_ACCESS_KEY_ID: test
  SCALITY_SECRET_ACCESS_KEY: test
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
---
apiVersion: v1
kind: Service
metadata:
  name: cloudserver
  labels:
    app.kubernetes.io/name: cloudserver
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
    - port: 8002
      targetPort: 8000
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: cloudserver
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudserver
  labels:
    app.kubernetes.io/name: cloudserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudserver
    spec:
      containers:
        - name: cloudserver
          image: zenko/cloudserver:latest
          env:
            - name: SCALITY_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cloudserver
                  key: SCALITY_ACCESS_KEY_ID
            - name: SCALITY_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudserver
                  key: SCALITY_SECRET_ACCESS_KEY
            - name: LISTEN_ADDR
              value: "0.0.0.0"
            - name: ENDPOINT
              value: cloudserver
            - name: REMOTE_MANAGEMENT_DISABLE
              value: "1"
          livenessProbe:
            httpGet:
              path: /live
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
              cpu: 250m
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cloudserver-create-bucket
  labels:
    app.kubernetes.io/name: cloudserver
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudserver-create-bucket
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-cloudserver
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
                echo "Waiting 15s for cloudserver to be ready..."
                sleep 15
      containers:
        - name: create-bucket
          image: amazon/aws-cli
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cloudserver
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudserver
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: us-west-2
          command:
            - aws
            - s3
            - mb
            - s3://mybucket
            - --endpoint-url
            - http://cloudserver:8000
            - --region
            - us-west-2
