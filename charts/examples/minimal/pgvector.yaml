---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgvector-init
data:
  init_db.sql: |
    \c ragnerock;
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS vector;
---
apiVersion: v1
kind: Secret
metadata:
  name: pgvector
type: Opaque
stringData:
  POSTGRES_USER: ragnerock
  POSTGRES_PASSWORD: password
  POSTGRES_DB: ragnerock
---
apiVersion: v1
kind: Service
metadata:
  name: pgvector
  labels:
    app.kubernetes.io/name: pgvector
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: pgvector
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgvector
  labels:
    app.kubernetes.io/name: pgvector
spec:
  serviceName: pgvector
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgvector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgvector
    spec:
      containers:
        - name: pgvector
          image: ankane/pgvector:v0.5.1
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pgvector
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgvector
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: pgvector
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ragnerock
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - ragnerock
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: init-scripts
          configMap:
            name: pgvector-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
