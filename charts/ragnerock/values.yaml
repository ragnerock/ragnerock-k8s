global:
  # -- Global container image configuration
  image:
    registry: us-central1-docker.pkg.dev/ragnerock-prod/ragnerock 
    pullPolicy: IfNotPresent
    tag: "latest"
  # -- Secrets use to authenticate with the container registry, list of `- name: <name of the secret>` values
  imagePullSecrets: []

# -- Database configuration
database:
  host: ""
  port: 5432
  name: ragnerock
  user: ragnerock
  password: ""
  poolSize: 20
  maxOverflow: 40
  poolTimeout: 10

# -- LLM authentication configuration
llm:
  geminiApiKey: ""
  mistralApiKey: ""

encryption:
  # -- Key Encryption Key (KEK), generate with python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())'
  kek: ""

# -- General app configuration
config:
  environmentIdentifier: ragnerock
  logLevel: INFO

ragnerock:
  # -- Should Ragnerock treat all prompts as unsafe
  safetyEnabled: true

# -- Otel metrics/traces/logs export
otel:
  enabled: false
  exporterEndpoint: ""
  exporterInsecure: false
  exporterProtocol: "http/protobuf"
  authHeader: ""

# -- Cloudtask configuration for use with in-cluster emulator
cloudTasks:
  jobQueueName: "ragnerock-document-jobs"
  subtaskQueueName: "ragnerock-subtask-jobs"
  maxDispatchesPerSecond: 500
  maxConcurrentDispatches: 500
  queuePoolSize: 100
  emulator:
    port: 8123

auth:
  # -- Generate with `openssl rand -hex 22`
  secretKey: ""
  # -- Generate with `openssl rand -hex 22`
  accessKey: ""
  accessTokenExpireMinutes: 10080
  accessCodeExpireMinutes: 10080
  lockoutMaxAttempts: 10

cloudflare:
  apiToken: ""
  accountId: ""

rateLimits:
  windowMinutes: 1
  requestsPerMinute: 600
  chatCreatePerMinute: 600
  documentChunkCreatePerMinute: 600
  frontendEventsPerMinute: 600
  authLoginPerMinute: 15
  authRegisterPerMinute: 15
  authGooglePerMinute: 15
  authRequestCodePerMinute: 5
  authValidateCodePerMinute: 15
  authChangePasswordPerMinute: 5
  agentPerMinute: 20
  notebookCodeFeedbackPerMinute: 40
  documentUploadPerMinute: 60
  searchPerMinute: 60
  ingestTriggerPerMinute: 20
  toolsPerMinute: 60
  annotationPerMinute: 120
  debugPerMinute: 20
  workflowTestConditionPerMinute: 120
  configValidatePerMinute: 20
  adminMutationPerMinute: 40
  iamMutationPerMinute: 60

model:
  geminiModelName: "gemini-3-flash-preview"
  httpTimeoutSeconds: 180

api:
  replicaCount: 1
  image:
    name: api
    tag: ""
  service:
    type: ClusterIP
    port: 8080
  # -- Deployment resoruce contraints (i.e. requests/limits)
  resources: {}
  fqdn: ""
  # -- Optional horizontal pod autoscaler. Requires CPU/memory requests to be
  # set under `resources` for the targeted metrics to work. When enabled,
  # `replicaCount` is ignored (the HPA manages the replica count).
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    # -- Target average CPU utilization (% of requests). Set to null to disable.
    targetCPUUtilizationPercentage: 80
    # -- Target average memory utilization (% of requests). Set to null to disable.
    targetMemoryUtilizationPercentage: 80

worker:
  replicaCount: 1
  image:
    name: worker
    tag: ""
  service:
