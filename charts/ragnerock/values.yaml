  resources: {}

limits:
  concurrency:
    maxConcurrentSubtasks: 50
    maxConcurrentAnnotations: 10
    maxConcurrentJobs: 5
    maxConcurrentTasks: 10
  usage:
    maxInputTokens: "1000000"
    maxOutputTokens: "1000000"
    maxPages: "2000"
    maxComputeSeconds: "86400"
  batches:
    embedding: 100
    annotation: 50
    tabularAnnotation: 200
    defaultRow: 50
  subtask:
    maxAttempts: 3
    failureThreshold: 0.05

# -- Ragnerock provided license key
license: ""