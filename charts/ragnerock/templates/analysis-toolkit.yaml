apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ragnerock.fullname" . }}-analysis-toolkit
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "analysis-toolkit") | nindent 4 }}
spec:
  replicas: {{ .Values.analysisToolkit.replicaCount }}
  selector:
    matchLabels:
      {{- include "ragnerock.selectorLabels" (dict "context" . "component" "analysis-toolkit") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ragnerock.labels" . | nindent 8 }}
        {{- include "ragnerock.selectorLabels" (dict "context" . "component" "analysis-toolkit") | nindent 8 }}
    spec:
      {{- with (include "ragnerock.serviceAccountName" (dict "context" . "config" .Values.analysisToolkit.serviceAccount "component" "analysis-toolkit")) }}
      serviceAccountName: {{ . }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: analysis-toolkit
          image: {{ include "ragnerock.image" (dict "global" .Values.global "image" .Values.analysisToolkit.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-config
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-otel
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-audience
            - secretRef:
                name: {{ include "ragnerock.fullname" . }}-otel
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=analysis-toolkit,deployment.environment={{ .Values.config.environmentIdentifier }}
            - name: OTEL_SERVICE_NAME
              value: analysis-toolkit
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.analysisToolkit.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ragnerock.fullname" . }}-analysis-toolkit
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "analysis-toolkit") | nindent 4 }}
spec:
  type: {{ .Values.analysisToolkit.service.type }}
  ports:
    - port: {{ .Values.analysisToolkit.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "analysis-toolkit") | nindent 4 }}
