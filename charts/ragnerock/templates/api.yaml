apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ragnerock.fullname" . }}-api
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "ragnerock.selectorLabels" (dict "context" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ragnerock.labels" . | nindent 8 }}
        {{- include "ragnerock.selectorLabels" (dict "context" . "component" "api") | nindent 8 }}
    spec:
      {{- with (include "ragnerock.serviceAccountName" (dict "context" . "config" .Values.api.serviceAccount "component" "api")) }}
      serviceAccountName: {{ . }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations | default .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "ragnerock.image" (dict "global" .Values.global "image" .Values.api.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-config
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-api
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-api-tokens
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-usage
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-rate-limits
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-analysis-toolkit
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-data-ingestor
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-db
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-otel
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-frontend
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-worker
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-model-service
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-cloud-tasks
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-audience
            - secretRef:
                name: {{ include "ragnerock.fullname" . }}-db
            - secretRef:
                name: {{ include "ragnerock.fullname" . }}-llm
            - secretRef:
                name: {{ include "ragnerock.fullname" . }}-auth
            - secretRef:
                name: {{ include "ragnerock.fullname" . }}-encryption
            - secretRef:
                name: {{ include "ragnerock.fullname" . }}-otel
            - secretRef:
                name: {{ include "ragnerock.fullname" . }}-license
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=api,deployment.environment={{ .Values.config.environmentIdentifier }}
            - name: OTEL_SERVICE_NAME
              value: api
          {{- with .Values.api.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.api.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ragnerock.fullname" . }}-api
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "api") | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "api") | nindent 4 }}
