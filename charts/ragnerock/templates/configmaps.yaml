apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-config
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  ENVIRONMENT_IDENTIFIER: {{ .Values.config.environmentIdentifier }}
  LOG_LEVEL: {{ .Values.config.logLevel }}
  RAGNEROCK_SAFETY_ENABLED: "{{ .Values.ragnerock.safetyEnabled }}"
  MODEL_HTTP_TIMEOUT_SECONDS: "{{ .Values.model.httpTimeoutSeconds }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-api-tokens
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  ACCESS_TOKEN_EXPIRE_MINUTES: "{{ .Values.auth.accessTokenExpireMinutes }}"
  ACCESS_CODE_EXPIRE_MINUTES: "{{ .Values.auth.accessCodeExpireMinutes }}"
  AUTH_LOCKOUT_MAX_ATTEMPTS: "{{ .Values.auth.lockoutMaxAttempts }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-api
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  API_SELF_URL: "http://{{ include "ragnerock.fullname" . }}-api:8080"
  DB_POOL_SIZE: "{{ .Values.database.poolSize }}"
  DB_MAX_OVERFLOW: "{{ .Values.database.maxOverflow }}"
  DB_POOL_TIMEOUT: "{{ .Values.database.poolTimeout }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-rate-limits
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  RATE_LIMIT_WINDOW_MINUTES: "{{ .Values.rateLimits.windowMinutes }}"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "{{ .Values.rateLimits.requestsPerMinute }}"
  RATE_LIMIT_CHAT_CREATE_PER_MINUTE: "{{ .Values.rateLimits.chatCreatePerMinute }}"
  RATE_LIMIT_DOCUMENT_CHUNK_CREATE_PER_MINUTE: "{{ .Values.rateLimits.documentChunkCreatePerMinute }}"
  RATE_LIMIT_FRONTEND_EVENTS_PER_MINUTE: "{{ .Values.rateLimits.frontendEventsPerMinute }}"
  RATE_LIMIT_AUTH_LOGIN_PER_MINUTE: "{{ .Values.rateLimits.authLoginPerMinute }}"
  RATE_LIMIT_AUTH_REGISTER_PER_MINUTE: "{{ .Values.rateLimits.authRegisterPerMinute }}"
  RATE_LIMIT_AUTH_GOOGLE_PER_MINUTE: "{{ .Values.rateLimits.authGooglePerMinute }}"
  RATE_LIMIT_AUTH_REQUEST_CODE_PER_MINUTE: "{{ .Values.rateLimits.authRequestCodePerMinute }}"
  RATE_LIMIT_AUTH_VALIDATE_CODE_PER_MINUTE: "{{ .Values.rateLimits.authValidateCodePerMinute }}"
  RATE_LIMIT_AUTH_CHANGE_PASSWORD_PER_MINUTE: "{{ .Values.rateLimits.authChangePasswordPerMinute }}"
  RATE_LIMIT_AGENT_PER_MINUTE: "{{ .Values.rateLimits.agentPerMinute }}"
  RATE_LIMIT_NOTEBOOK_CODE_FEEDBACK_PER_MINUTE: "{{ .Values.rateLimits.notebookCodeFeedbackPerMinute }}"
  RATE_LIMIT_DOCUMENT_UPLOAD_PER_MINUTE: "{{ .Values.rateLimits.documentUploadPerMinute }}"
  RATE_LIMIT_SEARCH_PER_MINUTE: "{{ .Values.rateLimits.searchPerMinute }}"
  RATE_LIMIT_INGEST_TRIGGER_PER_MINUTE: "{{ .Values.rateLimits.ingestTriggerPerMinute }}"
  RATE_LIMIT_TOOLS_PER_MINUTE: "{{ .Values.rateLimits.toolsPerMinute }}"
  RATE_LIMIT_ANNOTATION_PER_MINUTE: "{{ .Values.rateLimits.annotationPerMinute }}"
  RATE_LIMIT_DEBUG_PER_MINUTE: "{{ .Values.rateLimits.debugPerMinute }}"
  RATE_LIMIT_WORKFLOW_TEST_CONDITION_PER_MINUTE: "{{ .Values.rateLimits.workflowTestConditionPerMinute }}"
  RATE_LIMIT_CONFIG_VALIDATE_PER_MINUTE: "{{ .Values.rateLimits.configValidatePerMinute }}"
  RATE_LIMIT_ADMIN_MUTATION_PER_MINUTE: "{{ .Values.rateLimits.adminMutationPerMinute }}"
  RATE_LIMIT_IAM_MUTATION_PER_MINUTE: "{{ .Values.rateLimits.iamMutationPerMinute }}"
  RATE_LIMIT_API_TOKEN_PER_MINUTE: "{{ .Values.rateLimits.apiTokenPerMinute }}"
  RATE_LIMIT_NOTIFICATION_STREAM_PER_MINUTE: "{{ .Values.rateLimits.notificationStreamPerMinute }}"
  RATE_LIMIT_QUERY_ASSIST: "{{ .Values.rateLimits.queryAssistPerMinute }}"
  RATE_LIMIT_QUERY_EXECUTE: "{{ .Values.rateLimits.queryExecutePerMinute }}"
  RATE_LIMIT_QUERY_VALIDATE: "{{ .Values.rateLimits.queryValidatePerMinute }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-analysis-toolkit
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  ANALYSIS_TOOLKIT_URL: http://{{ include "ragnerock.fullname" . }}-analysis-toolkit:{{ .Values.analysisToolkit.service.port }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-data-ingestor
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  DATA_INGESTOR_URL: http://{{ include "ragnerock.fullname" . }}-data-ingestor:{{ .Values.dataIngestor.service.port }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-db-service
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  DB_SERVICE_URL: http://{{ include "ragnerock.fullname" . }}-db-service:{{ .Values.dbService.service.port }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-db-service-config
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  BATCH_LIMIT: "{{ .Values.dbService.batchLimit }}"
  RATE_LIMIT_MAX_TOKENS: "{{ .Values.dbService.rateLimitMaxTokens }}"
  RATE_LIMIT_REFILL_RATE: "{{ .Values.dbService.rateLimitRefillRate }}"
  CONNECTION_FAILURE_THRESHOLD: "{{ .Values.dbService.connectionFailureThreshold }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-db
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  DB_HOST: {{ .Values.database.host }}
  DB_PORT: "{{ .Values.database.port }}"
  DB_NAME: {{ .Values.database.name }}
  DB_USER: {{ .Values.database.user }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-otel
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  OTEL_ENABLED: "{{ .Values.otel.enabled }}"
  OTEL_SDK_DISABLED: {{ eq (.Values.otel.enabled | toString) "true" | not | toString | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.exporterEndpoint }}
  OTEL_EXPORTER_OTLP_INSECURE: "{{ .Values.otel.exporterInsecure }}"
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .Values.otel.exporterProtocol }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-frontend
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  NODE_ENV: production
  NEXT_PUBLIC_API_URL: {{ .Values.api.url }}
  FRONTEND_ORIGIN: {{ .Values.frontend.url }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-worker
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  WORKER_URL: http://{{ include "ragnerock.fullname" . }}-worker:{{ .Values.worker.service.port }}
  PDF_PARSER_BACKEND: "{{ .Values.llm.pdfParserBackend }}"
{{- if eq .Values.llm.pdfParserBackend "azure" }}
  AZURE_DOC_INTEL_ENDPOINT: "{{ .Values.llm.azure.endpoint }}"
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-subtask-worker
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  SUBTASK_WORKER_URL: http://{{ include "ragnerock.fullname" . }}-subtask-worker:{{ .Values.subtaskWorker.service.port }}
  PDF_PARSER_BACKEND: "{{ .Values.llm.pdfParserBackend }}"
{{- if eq .Values.llm.pdfParserBackend "azure" }}
  AZURE_DOC_INTEL_ENDPOINT: "{{ .Values.llm.azure.endpoint }}"
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-model-service
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  MODEL_URL: http://{{ include "ragnerock.fullname" . }}-model-service:{{ .Values.modelService.service.port }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-model
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  GEMINI_MODEL_NAME: {{ .Values.model.geminiModelName | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-queue
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  CLOUD_TASKS_ENABLED: "true"
  CLOUD_TASKS_JOB_QUEUE_NAME: "{{ .Values.queue.jobQueueName }}"
  CLOUD_TASKS_SUBTASK_QUEUE_NAME: "{{ .Values.queue.subtaskQueueName }}"
  CLOUD_TASKS_CALLBACK_QUEUE: "{{ .Values.queue.callbackQueueName }}"
  CLOUD_TASKS_MAX_DISPATCHES_PER_SECOND: "{{ .Values.queue.maxDispatchesPerSecond }}"
  CLOUD_TASKS_MAX_CONCURRENT_DISPATCHES: "{{ .Values.queue.maxConcurrentDispatches }}"
  QUEUE_POOL_SIZE: "{{ .Values.queue.queuePoolSize }}"
  CLOUD_TASKS_ENDPOINT: {{ include "ragnerock.fullname" . }}-queue:{{ .Values.queue.port }}
  CLOUD_TASKS_PROJECT_ID: local
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-limits
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  MAX_CONCURRENT_SUBTASKS: "{{ .Values.limits.concurrency.maxConcurrentSubtasks }}"
  MAX_CONCURRENT_ANNOTATIONS: "{{ .Values.limits.concurrency.maxConcurrentAnnotations }}"
  MAX_CONCURRENT_JOBS: "{{ .Values.limits.concurrency.maxConcurrentJobs }}"
  EMBEDDING_BATCH_SIZE: "{{ .Values.limits.batches.embedding }}"
  ANNOTATION_BATCH_SIZE: "{{ .Values.limits.batches.annotation }}"
  TABULAR_ANNOTATION_BATCH_SIZE: "{{ .Values.limits.batches.tabularAnnotation }}"
  DEFAULT_ROW_BATCH_SIZE: "{{ .Values.limits.batches.defaultRow }}"
  SUBTASK_MAX_ATTEMPTS: "{{ .Values.limits.subtask.maxAttempts }}"
  SUBTASK_FAILURE_THRESHOLD: "{{ .Values.limits.subtask.failureThreshold }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-audience
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  ANALYSIS_TOOLKIT_AUDIENCE: "http://{{ include "ragnerock.fullname" . }}-analysis-toolkit:{{ .Values.analysisToolkit.service.port }}"
  API_AUDIENCE: "http://{{ include "ragnerock.fullname" . }}-api:{{ .Values.api.service.port }}"
  DATA_INGESTOR_AUDIENCE: "http://{{ include "ragnerock.fullname" . }}-data-ingestor:{{ .Values.dataIngestor.service.port }}"
  DB_SERVICE_AUDIENCE: "http://{{ include "ragnerock.fullname" . }}-db-service:{{ .Values.dbService.service.port }}"
  MODEL_SERVICE_AUDIENCE: "http://{{ include "ragnerock.fullname" . }}-model-service:{{ .Values.modelService.service.port }}"
  SCHEDULER_AUDIENCE: "http://{{ include "ragnerock.fullname" . }}-data-ingestor:{{ .Values.dataIngestor.service.port }}"
  SUBTASK_WORKER_SERVICE_AUDIENCE: "http://{{ include "ragnerock.fullname" . }}-subtask-worker:{{ .Values.subtaskWorker.service.port }}"
  WORKER_SERVICE_AUDIENCE: "http://{{ include "ragnerock.fullname" . }}-worker:{{ .Values.worker.service.port }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-endpoints
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  ENDPOINTS_ALLOW_PRIVATE_CALLBACKS: "{{ .Values.endpoints.allowPrivateCallbacks }}"
  ENDPOINTS_EPHEMERAL_TTL_HOURS: "{{ .Values.endpoints.ephemeralTTLHours }}"
  ENDPOINTS_MAX_FILE_SIZE_MB: "{{ .Values.endpoints.maxFileSizeMB }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-ingest
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  INGEST_RUN_STALE_TIMEOUT_SECONDS: "{{ .Values.ingest.staleTimeoutSeconds }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-callback-delivery
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  CALLBACK_DELIVERY_URL: http://{{ include "ragnerock.fullname" . }}-callback-delivery:{{ .Values.callbackDelivery.service.port }}
  CALLBACK_ALLOWED_HOSTS: "ragnerock-api:8080"
  CALLBACK_HTTP_ALLOWED: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ragnerock.fullname" . }}-analysis
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
data:
  DATAFRAME_OP_TIMEOUT: "{{ .Values.analysis.dataframeOpTimeout }}"
  MAX_COLUMNS: "{{ .Values.analysis.maxColumns }}"
  MAX_ROWS: "{{ .Values.analysis.maxRows }}"
  MODEL_FIT_TIMEOUT: "{{ .Values.analysis.modelFitTimeoutSeconds }}"
  PLOT_DPI: "{{ .Values.analysis.plotDPI }}"
  PLOT_MAX_FIGSIZE: "[{{ .Values.analysis.plotMaxFigsize.dimx }},{{ .Values.analysis.plotMaxFigsize.dimy }}]"
  PLOT_TIMEOUT: "{{ .Values.analysis.plotTimeoutSeconds }}"
