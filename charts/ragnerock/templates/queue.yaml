apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ragnerock.fullname" . }}-queue
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "queue") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ragnerock.selectorLabels" (dict "context" . "component" "queue") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ragnerock.labels" . | nindent 8 }}
        {{- include "ragnerock.selectorLabels" (dict "context" . "component" "queue") | nindent 8 }}
    spec:
{{- with (include "ragnerock.serviceAccountName" (dict "context" . "config" .Values.queue.serviceAccount "component" "queue")) }}
      serviceAccountName: {{ . }}
{{- end }}
{{- with .Values.queue.tolerations | default .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
{{- end }}
      containers:
        - name: queue
          image: ghcr.io/aertje/cloud-tasks-emulator:latest
          command: ["./emulator", "-host", "0.0.0.0", "-port", "{{ .Values.queue.port }}"]
          ports:
            - name: grpc
              containerPort: {{ .Values.queue.port }}
              protocol: TCP
          env:
            - name: APP_ENGINE_EMULATOR_HOST
              value: "http://localhost:8080"
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ragnerock.fullname" . }}-queue
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "queue") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.queue.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "queue") | nindent 4 }}
