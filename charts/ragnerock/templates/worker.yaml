apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ragnerock.fullname" . }}-worker
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "worker") | nindent 4 }}
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ragnerock.selectorLabels" (dict "context" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ragnerock.labels" . | nindent 8 }}
        {{- include "ragnerock.selectorLabels" (dict "context" . "component" "worker") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "ragnerock.image" (dict "global" .Values.global "image" .Values.worker.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-config
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-db
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-otel
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-worker
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-subtask-worker
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-model-service
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-cloud-tasks
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-limits
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-audience
            - secretRef:
                name: {{ include "ragnerock.fullname" . }}-db
            - secretRef:
                name: {{ include "ragnerock.fullname" . }}-llm
            - secretRef:
                name: {{ include "ragnerock.fullname" . }}-encryption
            - secretRef:
                name: {{ include "ragnerock.fullname" . }}-otel
            - secretRef:
                name: {{ include "ragnerock.fullname" . }}-license
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=worker,deployment.environment={{ .Values.config.environmentIdentifier }}
            - name: OTEL_SERVICE_NAME
              value: worker
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ragnerock.fullname" . }}-worker
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "worker") | nindent 4 }}
spec:
  type: {{ .Values.worker.service.type }}
  ports:
    - port: {{ .Values.worker.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "worker") | nindent 4 }}
