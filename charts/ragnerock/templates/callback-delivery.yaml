apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ragnerock.fullname" . }}-callback-delivery
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "callback-delivery") | nindent 4 }}
spec:
{{- if not .Values.callbackDelivery.autoscaling.enabled }}
  replicas: {{ .Values.callbackDelivery.replicaCount }}
{{- end }}
  revisionHistoryLimit: {{ .Values.global.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "ragnerock.selectorLabels" (dict "context" . "component" "callback-delivery") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ragnerock.labels" . | nindent 8 }}
        {{- include "ragnerock.selectorLabels" (dict "context" . "component" "callback-delivery") | nindent 8 }}
    spec:
{{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.callbackDelivery.tolerations | default .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
{{- end }}
      containers:
        - name: callback-delivery
          image: {{ include "ragnerock.image" (dict "global" .Values.global "image" .Values.callbackDelivery.image "chart" .Chart) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-config
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-otel
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-callback-delivery
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-queue
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-audience
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-db
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-endpoints
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-model-service
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-worker
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-data-ingestor
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-api
            - secretRef:
                name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "otel" "existingSecret" .Values.otel.existingSecret) }}
            - secretRef:
                name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "db" "existingSecret" .Values.database.existingSecret) }}
            - secretRef:
                name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "encryption" "existingSecret" .Values.encryption.existingSecret) }}
            - secretRef:
                name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "endpoints" "existingSecret" .Values.endpoints.existingSecret) }}
            - secretRef:
                name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "license" "existingSecret" .Values.licenseExistingSecret) }}
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=callback-delivery,deployment.environment={{ .Values.config.environmentIdentifier }}
            - name: OTEL_SERVICE_NAME
              value: callback-delivery
{{- with .Values.callbackDelivery.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
{{- end }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
{{- with .Values.callbackDelivery.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.modelService.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ragnerock.fullname" . }}-callback-delivery
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "callback-delivery") | nindent 4 }}
spec:
  type: {{ .Values.callbackDelivery.service.type }}
  ports:
    - port: {{ .Values.callbackDelivery.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "callback-delivery") | nindent 4 }}
