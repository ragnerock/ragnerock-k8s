apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ragnerock.fullname" . }}-migrations
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "migrations") | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
{{- with (include "ragnerock.annotations" (dict "context" . "config" .Values.migrations)) }}
    {{- . | nindent 4 }}
{{- end }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "ragnerock.selectorLabels" (dict "context" . "component" "migrations") | nindent 8 }}
    spec:
{{- with (include "ragnerock.serviceAccountName" (dict "context" . "config" .Values.migrations.serviceAccount "component" "migrations")) }}
      serviceAccountName: {{ . }}
{{- end }}
{{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.migrations.tolerations | default .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
{{- end }}
      restartPolicy: Never
      containers:
        - name: migrations
          image: {{ include "ragnerock.image" (dict "global" .Values.global "image" .Values.migrations.image "chart" .Chart) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-db
            - secretRef:
                name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "db" "existingSecret" .Values.database.existingSecret) }}
{{- with .Values.migrations.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
{{- end }}
