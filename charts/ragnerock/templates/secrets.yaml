apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.fullname" . }}-db
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  DB_PASSWORD: {{ .Values.database.password | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.fullname" . }}-llm
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  GEMINI_API_KEY: {{ .Values.llm.geminiApiKey | b64enc | quote }}
  MISTRAL_API_KEY: {{ .Values.llm.mistralApiKey | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.fullname" . }}-auth
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  SECRET_KEY: {{ .Values.auth.secretKey | b64enc | quote }}
  ACCESS_KEY: {{ .Values.auth.accessKey | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.fullname" . }}-encryption
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  ENCRYPTION_KEK: {{ .Values.encryption.kek | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.fullname" . }}-otel
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  OTEL_EXPORTER_OTLP_HEADERS: {{ .Values.otel.authHeader | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.fullname" . }}-cloudflare
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  CLOUDFLARE_API_TOKEN: {{ .Values.cloudflare.apiToken | b64enc | quote }}
  CLOUDFLARE_ACCOUNT_ID: {{ .Values.cloudflare.accountId | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.fullname" . }}-license
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  RAGNEROCK_LICENSE: {{ .Values.license | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.fullname" . }}-endpoints
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  ENDPOINTS_HMAC_MASTER_KEY: {{ .Values.endpoints.HMACMasterKey | b64enc | quote }}
