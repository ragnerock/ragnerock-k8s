{{- if not .Values.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "db" "existingSecret" .Values.database.existingSecret) }}
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  DB_PASSWORD: {{ .Values.database.password | b64enc | quote }}
---
{{- end }}
{{- if not .Values.llm.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "llm" "existingSecret" .Values.llm.existingSecret) }}
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  GEMINI_API_KEY: {{ .Values.llm.gemini.apiKey | b64enc | quote }}
  {{- if eq .Values.llm.pdfParserBackend "mistral" }}
  MISTRAL_API_KEY: {{ .Values.llm.mistral.apiKey | b64enc | quote }}
  {{- end }}
  {{- if eq .Values.llm.pdfParserBackend "azure" }}
  AZURE_DOC_INTEL_KEY: {{ .Values.llm.azure.apiKey | b64enc | quote }}
  {{- end }}
---
{{- end }}
{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "auth" "existingSecret" .Values.auth.existingSecret) }}
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  SECRET_KEY: {{ .Values.auth.secretKey | b64enc | quote }}
  ACCESS_KEY: {{ .Values.auth.accessKey | b64enc | quote }}
---
{{- end }}
{{- if not .Values.encryption.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "encryption" "existingSecret" .Values.encryption.existingSecret) }}
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  ENCRYPTION_KEK: {{ .Values.encryption.kek | b64enc | quote }}
---
{{- end }}
{{- if not .Values.otel.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "otel" "existingSecret" .Values.otel.existingSecret) }}
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  OTEL_EXPORTER_OTLP_HEADERS: {{ .Values.otel.authHeader | b64enc | quote }}
---
{{- end }}
{{- if not .Values.cloudflare.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "cloudflare" "existingSecret" .Values.cloudflare.existingSecret) }}
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  CLOUDFLARE_API_TOKEN: {{ .Values.cloudflare.apiToken | b64enc | quote }}
  CLOUDFLARE_ACCOUNT_ID: {{ .Values.cloudflare.accountId | b64enc | quote }}
---
{{- end }}
{{- if not .Values.licenseExistingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "license" "existingSecret" .Values.licenseExistingSecret) }}
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  RAGNEROCK_LICENSE: {{ .Values.license | b64enc | quote }}
{{- end }}
---
{{- if not .Values.endpoints.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragnerock.secretName" (dict "context" . "suffix" "endpoints" "existingSecret" .Values.endpoints.existingSecret) }}
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
type: Opaque
data:
  ENDPOINTS_HMAC_MASTER_KEY: {{ .Values.endpoints.HMACMasterKey | b64enc | quote }}
{{- end }}
