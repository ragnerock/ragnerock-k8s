
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ragnerock.fullname" . }}-frontend
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "frontend") | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "ragnerock.selectorLabels" (dict "context" . "component" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ragnerock.labels" . | nindent 8 }}
        {{- include "ragnerock.selectorLabels" (dict "context" . "component" "frontend") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations | default .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "ragnerock.image" (dict "global" .Values.global "image" .Values.frontend.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-config
            - configMapRef:
                name: {{ include "ragnerock.fullname" . }}-frontend
            - secretRef:
                name: {{ include "ragnerock.fullname" . }}-otel
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=frontend,deployment.environment={{ .Values.config.environmentIdentifier }}
            - name: OTEL_SERVICE_NAME
              value: frontend
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.frontend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ragnerock.fullname" . }}-frontend
  labels:
    {{- include "ragnerock.labels" . | nindent 4 }}
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "frontend") | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ragnerock.selectorLabels" (dict "context" . "component" "frontend") | nindent 4 }}
